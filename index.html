<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Canvas Companion Tools</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1>Estudo de Luz e Sombra</h1>

        <input type="color" id="colorPicker" value="#0541ff">

        <div class="palette">
            <div class="box" id="highlight"></div>
            <div class="box" id="base"></div>
            <div class="box" id="paletteshadow"></div>
            <div class="box" id="deepShadow"></div>
        </div>
        <br>
        <select id="material">
            <option value="plastic">Plástico</option>
            <option value="metal">Metal</option>
            <option value="rough">Rugoso</option>
            <option value="fabric">Tecido</option>
        </select>

        <div class="scene">
            <div id="sphere"></div>
            <div id="colorshadow"></div>
        </div>

        <script src="scripts/main.js"></script>
    </body>
</html>
